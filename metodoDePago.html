<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - MiTienda</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="navbar"></div>
<script>
    fetch("navbar.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;
        });
</script>

<main class="checkout-container">

    <!-- FORMULARIO -->
    <section class="checkout-form">
        <h2>Información del Cliente</h2>

        <div class="input-group">
            <input type="text" placeholder="Nombre completo">
            <input type="email" placeholder="Correo electrónico">
            <input type="text" placeholder="Teléfono">
            <input type="text" placeholder="Dirección">
        </div>

        <h2>Forma de Pago</h2>
        <div class="options">
            <label><input type="radio" name="pago"> Tarjeta de Crédito / Débito</label>
            <label><input type="radio" name="pago"> PayPal</label>
            <label><input type="radio" name="pago"> Transferencia Bancaria</label>
        </div>

        <h2>Forma de Entrega</h2>
        <div class="options">
            <label><input type="radio" name="entrega"> Envío a Domicilio</label>
            <label><input type="radio" name="entrega"> Recoger en Tienda</label>
        </div>

        <button class="btn-confirmar">Confirmar Pedido</button>
    </section>

    <!-- RESUMEN -->
    <aside class="checkout-summary">
        <h2>Resumen del Pedido</h2>

        <div class="product">
            <p>Moto Deportiva X200</p>
            <span>$85,000 MXN</span>
        </div>

        <div class="product">
            <p>Casco Profesional</p>
            <span>$2,500 MXN</span>
        </div>

        <div class="total">
            <p>Total:</p>
            <span>$87,500 MXN</span>
        </div>
    </aside>

</main>

<!-- Llamada al archivo de la barra de navegación -->
<div id="footer"></div>
<script>
    fetch("footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("footer").innerHTML = data;
        });
</script>
</body>
</html>
