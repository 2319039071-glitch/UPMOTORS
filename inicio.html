<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INICIO</title>
<link rel="stylesheet" href="CSS/styles.css">
</head>
<body>


<!-- Llamada al archivo de la barra de navegación -->
        <div id="navbar"></div>

        <script>
        fetch("navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                // 🔥 ACTIVAR MENÚ DESPUÉS DE CARGARLO
                const toggle = document.getElementById("menu-toggle");
                const nav = document.getElementById("nav");

                toggle.addEventListener("click", () => {
                    nav.classList.toggle("active");
                });
            });
        </script>

<section class="hero">
    <h5>NUEVOS MODELOS 2026</h5>
    <h1>POTENCIA<br>SIN LÍMITES</h1>
    <p>Descubre nuestra nueva línea de motocicletas diseñadas para conquistar cualquier camino con estilo y rendimiento superior.</p>
    <div class="hero-buttons">
        <button class="btn btn-red">VER MODELOS</button>
        <button class="btn btn-outline">CONOCER MÁS</button>
    </div>
</section>

</body>
</html>

<!-- Llamada al archivo de pie de pagina  -->
<div id="footer"></div>
<script>
    fetch("footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("footer").innerHTML = data;
        });
</script>
