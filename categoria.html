    <!DOCTYPE html>
    <html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATEGORIA - Categorías</title>
    <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>

<!-- Llamada al archivo de la barra de navegación -->
        <div id="navbar"></div>

        <script>
        fetch("navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                // 🔥 ACTIVAR MENÚ DESPUÉS DE CARGARLO
                const toggle = document.getElementById("menu-toggle");
                const nav = document.getElementById("nav");

                toggle.addEventListener("click", () => {
                    nav.classList.toggle("active");
                });
            });
        </script>
    <section class="categorias">
        <h5>EXPLORA</h5>
        <h2>CATEGORÍAS</h2>
        <div class="linea"></div>

        <div class="contenedor-categorias">
        <div class="card">
        
            <h3>DEPORTIVAS</h3>
            <p>Velocidad y adrenalina pura</p>
        </div>

        <div class="card">
            <h3>NAKED</h3>
            <p>Estilo urbano agresivo</p>
        </div>
        </div>
    </section>

    </body>
    </html>
<!-- Llamada al archivo de footer -->
<div id="footer"></div>
<script>
    fetch("footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("footer").innerHTML = data;
        });
</script>
