<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña | UPMOTORS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<section class="recovery-container">

    <div class="recovery-box">
        <h2>Recuperar Contraseña</h2>
        <p>Ingresa tu correo electrónico y te enviaremos instrucciones para restablecer tu contraseña.</p>

        <form id="recoveryForm">

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="recoveryEmail" placeholder="tu@ejemplo.com" required>
            </div>

            <button type="submit" class="btn">Enviar Instrucciones</button>

            <p class="back-link">
                <a href="login.html">Volver al inicio de sesión</a>
            </p>

        </form>
    </div>

</section>

<script>
document.getElementById("recoveryForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("recoveryEmail").value.trim();

    if(email === ""){
        alert("Por favor ingresa tu correo electrónico.");
        return;
    }

    alert("Se han enviado las instrucciones a tu correo (simulación).");
});
</script>

</body>
</html>
