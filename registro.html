<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REGISTRO</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
 

    <!-- FORMULARIO DE REGISTRO -->
    <section class="hero">
        <h1>Bienvenido</h1>
        <h2>Registro de Nuevo Usuario</h2>
        <p>Completa el siguiente formulario para crear tu cuenta y acceder a todos nuestros servicios.</p>

        <div class="container">
            <div class="form-box" style="max-width: 400px; margin: 0 auto; background-color: #1f2833; padding: 40px; border-radius: 10px;">
                <form>
                    <div class="input-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px;">Nombre de Usuario</label>
                        <input type="text" placeholder="Tu nombre de usuario" style="width: 100%; padding: 10px; border: none; border-radius: 5px;">
                    </div>

                    <div class="input-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px;">Correo Electrónico</label>
                        <input type="email" placeholder="tu@ejemplo.com" style="width: 100%; padding: 10px; border: none; border-radius: 5px;">
                    </div>

                    <div class="input-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px;">Contraseña</label>
                        <input type="password" placeholder="****" style="width: 100%; padding: 10px; border: none; border-radius: 5px;">
                    </div>

                    <div class="input-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px;">Confirmar Contraseña</label>
                        <input type="password" placeholder="****" style="width: 100%; padding: 10px; border: none; border-radius: 5px;">
                    </div>

                    <div class="terms" style="margin-bottom: 20px; text-align: left;">
                        <input type="checkbox" id="terms">
                        <label for="terms">Acepto los términos y condiciones</label>
                    </div>

                    <button type="submit" class="btn btn-red" style="width: 100%;">Registrar</button>

                    <p class="login-link" style="margin-top: 20px; color: #ccc;">
                        ¿Ya tienes una cuenta?
                        <a href="#" style="color: #e63946;">Iniciar Sesión</a>
                    </p>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
